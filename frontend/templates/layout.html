<!DOCTYPE html>

<html>

<head>
    <title>Vision Scorecard</title>
    <!-- Tailwind CSS (required for utility classes) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- @tailwindplus/elements (required for el-popover, el-dialog, etc.) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1" type="module"></script>
</head>

<body>
    <header class="bg-white">
        <nav aria-label="Global" class="mx-auto flex max-w-7xl items-center justify-between p-6 lg:px-8">
            <div class="flex lg:flex-1">
                <a href="#" class="-m-1.5 p-1.5">
                    <span class="sr-only">Your Company</span>
                    <img src="https://tailwindcss.com/plus-assets/img/logos/mark.svg?color=indigo&shade=600" alt=""
                        class="h-8 w-auto" />
                </a>
            </div>
            <div class="flex lg:hidden">
                <button type="button" command="show-modal" commandfor="mobile-menu"
                    class="-m-2.5 inline-flex items-center justify-center rounded-md p-2.5 text-gray-700">
                    <span class="sr-only">Open main menu</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" data-slot="icon"
                        aria-hidden="true" class="size-6">
                        <path d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                </button>
            </div>
            <el-popover-group class="hidden lg:flex lg:gap-x-12">

                <a href="#" class="text-sm/6 font-semibold text-gray-900">Overview</a>
                <a href="#" class="text-sm/6 font-semibold text-gray-900">Fields</a>
            </el-popover-group>
        </nav>



        <el-dialog>
            <dialog id="mobile-menu" class="backdrop:bg-transparent lg:hidden">
                <div tabindex="0" class="fixed inset-0 focus:outline-none">
                    <el-dialog-panel
                        class="fixed inset-y-0 right-0 z-50 w-full overflow-y-auto bg-white p-6 sm:max-w-sm sm:ring-1 sm:ring-gray-900/10">
                        <div class="flex items-center justify-between">
                            <a href="#" class="-m-1.5 p-1.5">
                                <span class="sr-only">Your Company</span>
                                <img src="https://tailwindcss.com/plus-assets/img/logos/mark.svg?color=indigo&shade=600"
                                    alt="" class="h-8 w-auto" />
                            </a>
                            <button type="button" command="close" commandfor="mobile-menu"
                                class="-m-2.5 rounded-md p-2.5 text-gray-700">
                                <span class="sr-only">Close menu</span>
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                                    data-slot="icon" aria-hidden="true" class="size-6">
                                    <path d="M6 18 18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" />
                                </svg>
                            </button>
                        </div>
                        <div class="mt-6 flow-root">
                            <div class="-my-6 divide-y divide-gray-500/10">
                                <div class="space-y-2 py-6">
                                    <a href="#"
                                        class="-mx-3 block rounded-lg px-3 py-2 text-base/7 font-semibold text-gray-900 hover:bg-gray-50">Overview</a>
                                    <a href="#"
                                        class="-mx-3 block rounded-lg px-3 py-2 text-base/7 font-semibold text-gray-900 hover:bg-gray-50">Fields</a>
                                </div>
                            </div>
                        </div>
                    </el-dialog-panel>
                </div>
            </dialog>
        </el-dialog>
    </header>

    <style>
        /* Card grid */
        #card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.25rem;
            margin-top: 2rem;
        }

        .field-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 1rem;
            padding: 1.5rem 1.25rem;
            cursor: pointer;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
            transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 90px;
        }
        .field-card:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 6px 24px rgba(99,102,241,0.13);
            background: #f5f3ff;
        }
        .field-card h3 {
            font-size: 1rem;
            font-weight: 600;
            color: #4338ca;
            text-align: center;
            margin: 0;
        }

        /* Overlay backdrop */
        #card-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.35);
            z-index: 50;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        #card-overlay.open {
            display: flex;
        }

        /* Expanded modal */
        #card-modal {
            background: #fff;
            border-radius: 1.25rem;
            width: 90%;
            max-width: 580px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            position: relative;
            animation: popIn 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #card-modal h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #3730a3;
            margin: 0 0 1rem 0;
            padding-right: 2rem;
        }
        #card-modal p {
            font-size: 0.95rem;
            color: #374151;
            line-height: 1.7;
            white-space: pre-line;
            margin: 0;
        }
        #close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: #f3f4f6;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
            color: #6b7280;
            transition: background 0.15s;
        }
        #close-btn:hover { background: #e5e7eb; color: #111; }

        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.88); }
            to   { opacity: 1; transform: scale(1); }
        }
    </style>

    <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
        <div class="sm:flex sm:items-center">
            <div class="sm:flex-auto">
                <h1 class="text-2xl font-semibold leading-6 text-gray-900">Project Overview</h1>
                <p class="mt-2 text-sm text-gray-700">Click a field card to see its full analysis.</p>
            </div>
        </div>

        <!-- Card Grid -->
        <div id="card-grid">
            {% for row in rows %}
            <div class="field-card" data-field="{{ row.field | e }}" data-analysis="{{ row.analysis | e }}">
                <h3>{{ row.field }}</h3>
            </div>
            {% endfor %}
        </div>
    </main>

    <!-- Overlay Modal -->
    <div id="card-overlay" role="dialog" aria-modal="true">
        <div id="card-modal">
            <button id="close-btn" aria-label="Close">✕</button>
            <h2 id="modal-title"></h2>
            <p id="modal-analysis"></p>
        </div>
    </div>

    <script>
        const overlay  = document.getElementById('card-overlay');
        const modal    = document.getElementById('card-modal');
        const titleEl  = document.getElementById('modal-title');
        const analysisEl = document.getElementById('modal-analysis');
        const closeBtn = document.getElementById('close-btn');

        function openCard(field, analysis) {
            titleEl.textContent    = field;
            analysisEl.textContent = analysis;
            overlay.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeCard() {
            overlay.classList.remove('open');
            document.body.style.overflow = '';
        }

        document.querySelectorAll('.field-card').forEach(card => {
            card.addEventListener('click', () => {
                openCard(card.dataset.field, card.dataset.analysis);
            });
        });

        closeBtn.addEventListener('click', closeCard);

        // Close when clicking the backdrop (outside modal)
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) closeCard();
        });

        // Close on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeCard();
        });
    </script>

</body>

</html>
