{% extends "layout.html" %}

{% block content %}
<main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
    <div class="sm:flex sm:items-center mb-8">
        <div class="sm:flex-auto">
            <h1 class="text-3xl font-bold tracking-tight text-gray-900">Regional Strategic Plans</h1>
            <p class="mt-2 text-lg text-gray-600">Explore the 2023-2026 strategic goals for Kitchener, Waterloo, and Cambridge.</p>
        </div>
    </div>

    <!-- Tabs Header -->
    <div class="border-b border-gray-200">
        <nav class="-mb-px flex space-x-8" aria-label="Tabs">
            <button onclick="showPlan('waterloo')" id="tab-waterloo" class="tab-btn active border-indigo-500 text-indigo-600 whitespace-nowrap border-b-2 py-4 px-1 text-sm font-medium">
                Waterloo
            </button>
            <button onclick="showPlan('kitchener')" id="tab-kitchener" class="tab-btn border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 whitespace-nowrap border-b-2 py-4 px-1 text-sm font-medium">
                Kitchener
            </button>
            <button onclick="showPlan('cambridge')" id="tab-cambridge" class="tab-btn border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 whitespace-nowrap border-b-2 py-4 px-1 text-sm font-medium">
                Cambridge
            </button>
        </nav>
    </div>

    <!-- Plans Content -->
    <div class="mt-8">
        <div id="plan-waterloo" class="plan-content block">
            <div class="prose prose-indigo max-w-none bg-white p-8 rounded-xl shadow-sm border border-gray-100 overflow-y-auto max-h-[70vh]">
                <pre class="whitespace-pre-wrap font-sans text-gray-800 leading-relaxed">{{ plans.waterloo }}</pre>
            </div>
        </div>
        <div id="plan-kitchener" class="plan-content hidden">
            <div class="prose prose-indigo max-w-none bg-white p-8 rounded-xl shadow-sm border border-gray-100 overflow-y-auto max-h-[70vh]">
                <pre class="whitespace-pre-wrap font-sans text-gray-800 leading-relaxed">{{ plans.kitchener }}</pre>
            </div>
        </div>
        <div id="plan-cambridge" class="plan-content hidden">
            <div class="prose prose-indigo max-w-none bg-white p-8 rounded-xl shadow-sm border border-gray-100 overflow-y-auto max-h-[70vh]">
                <pre class="whitespace-pre-wrap font-sans text-gray-800 leading-relaxed">{{ plans.cambridge }}</pre>
            </div>
        </div>
    </div>
</main>

<style>
    .tab-btn.active {
        border-color: #4f46e5;
        color: #4f46e5;
    }
    .plan-content.hidden {
        display: none;
    }
    .plan-content.block {
        display: block;
    }
    pre {
        word-break: break-word;
    }
</style>

<script>
    function showPlan(city) {
        // Hide all plan contents
        document.querySelectorAll('.plan-content').forEach(el => {
            el.classList.remove('block');
            el.classList.add('hidden');
        });
        
        // Deactivate all tabs
        document.querySelectorAll('.tab-btn').forEach(el => {
            el.classList.remove('active', 'border-indigo-500', 'text-indigo-600');
            el.classList.add('border-transparent', 'text-gray-500');
        });
        
        // Show selected plan
        document.getElementById('plan-' + city).classList.remove('hidden');
        document.getElementById('plan-' + city).classList.add('block');
        
        // Activate selected tab
        const activeTab = document.getElementById('tab-' + city);
        activeTab.classList.add('active', 'border-indigo-500', 'text-indigo-600');
        activeTab.classList.remove('border-transparent', 'text-gray-500');
    }
</script>
{% endblock %}
